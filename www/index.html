<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhagawad Gita Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Atmospheric background layers -->
    <div class="bg-layer bg-orb bg-orb-1"></div>
    <div class="bg-layer bg-orb bg-orb-2"></div>
    <div class="bg-layer bg-orb bg-orb-3"></div>
    <div class="bg-noise"></div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <!-- Header -->
    <header class="header">
      <div class="header-emblem">ॐ</div>
      <h1 class="header-title">Shrimad Bhagavad Gītā</h1>
      <p class="header-subtitle">श्रीमद्‌भगवद्‌गीता</p>
      <p class="subtitle" id="audioCount">Loading sacred verses…</p>
    </header>

    <!-- Audio List Container -->
    <main class="main-content">
      <div id="audioList" class="audio-list"></div>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon">🕉</div>
        <h2>No Audio Files Found</h2>
        <p>Please add audio files to the All_Audio folder</p>
      </div>
    </main>

    <!-- Global Bottom Toolbar -->
    <div class="toolbar">
      <div class="toolbar-inner">

        <!-- Track info -->
        <div class="toolbar-info">
          <div class="track-name" id="currentTrackName">No track selected</div>
          <div class="track-time">
            <span id="currentTime">0:00</span>
            <span class="time-separator">·</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar">
            <div class="progress-bar-fill" id="progressBarFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
        </div>

        <!-- Main controls -->
        <div class="toolbar-controls">
          <button id="prevBtn" class="control-btn" aria-label="Previous track" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>

          <button id="rewindBtn" class="control-btn" aria-label="Rewind 10 seconds" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
            <span class="btn-badge">10</span>
          </button>

          <button id="globalPlayPauseBtn" class="control-btn control-btn-primary" aria-label="Play/Pause" disabled>
            <svg class="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="pause-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
          </button>

          <button id="forwardBtn" class="control-btn" aria-label="Forward 10 seconds" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
            <span class="btn-badge">10</span>
          </button>

          <button id="restartBtn" class="control-btn" aria-label="Restart track" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"></polyline>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
          </button>

          <button id="nextBtn" class="control-btn" aria-label="Next track" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
    <path d="M6 6l8 6-8 6V6zm9 0h2v12h-2V6z"/>
  </svg>
</button>
        </div>

        <!-- Options row -->
        <div class="toolbar-options">
          <button id="autoplayBtn" class="option-btn active" aria-label="Toggle autoplay">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
            <span class="option-label">Auto</span>
          </button>

          <button id="loopBtn" class="option-btn" aria-label="Toggle loop playlist">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/>
              <path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>
            </svg>
            <span class="option-label">Loop</span>
          </button>

          <div class="speed-control">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <input type="range" id="speedSlider" class="slider" min="0.5" max="2.5" step="0.25" value="1.0" aria-label="Playback speed"/>
            <span class="slider-label" id="speedLabel">1.00x</span>
          </div>

          <div class="volume-control">
            <button id="muteBtn" class="option-btn icon-only" aria-label="Mute/Unmute">
              <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              </svg>
              <svg class="mute-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
              </svg>
            </button>
            <input type="range" id="volumeSlider" class="slider" min="0" max="100" value="100" aria-label="Volume"/>
          </div>
        </div>

        <!-- Keyboard hint -->
        <div class="kb-hint">
          <span>Space · ←→ seek · ↑↓ track · M mute · L loop · R restart</span>
        </div>

      </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>
    <script src="audio-manifest.js"></script>
    <script src="app.js"></script>
  </body>
</html>
